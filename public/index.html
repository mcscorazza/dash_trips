<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard de Telemetria</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      @media (max-width: 768px) {
        #sidebar {
          display: none;
        }
      }

      body {
        font-family: Arial, sans-serif;
        display: flex;
        margin: 0;
        height: 100vh;
      }
      #sidebar {
        width: 300px;
        background: #f4f4f4;
        padding: 20px;
        overflow-y: auto;
      }
      #map {
        flex-grow: 1;
        height: 100%;
      }
      .trip-item {
        padding: 10px;
        margin-bottom: 5px;
        background: white;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      .trip-item:hover {
        background: #e0e0e0;
      }
      .status {
        font-size: 0.8em;
        font-weight: bold;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h2>Viagens</h2>
      <div id="trip-list">Carregando...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // Inicializa o Mapa apontando pro Brasil
      const map = L.map("map").setView([-15.7801, -47.9292], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap",
      }).addTo(map);

      let currentRouteGroup = L.featureGroup().addTo(map);

      // Carrega a lista do DynamoDB
      async function loadTrips() {
        const response = await fetch("/api/trips");
        const trips = await response.json();

        const listDiv = document.getElementById("trip-list");
        listDiv.innerHTML = "";

        trips.forEach((trip) => {
          const div = document.createElement("div");
          div.className = "trip-item";
          div.innerHTML = `
                    <div>ID: ${trip.batch_id.substring(0, 8)}...</div>
                    <div class="status">Status: ${trip.status}</div>
                `;
          // Ao clicar, desenha a rota
          div.onclick = () => drawRoute(trip.batch_id);
          listDiv.appendChild(div);
        });
      }

      function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Raio da Terra em km
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      function getSpeedColor(speed) {
        if (speed > 40) return "#ff0000"; // Vermelho (Rápido)
        if (speed > 20) return "#ff9900"; // Laranja (Médio)
        if (speed > 5) return "#33cc33"; // Verde (Devagar/Cruzeiro)
        return "#3388ff"; // Azul (Muito devagar ou Parado)
      }

      async function drawRoute(batch_id) {
        const response = await fetch(`/api/map-data/${batch_id}`);

        if (!response.ok) {
          const errorData = await response.json();
          alert(`Erro ao buscar dados: ${errorData.error}`);
          return;
        }

        const points = await response.json();

        if (points.length < 2) {
          alert(
            "Pontos insuficientes para traçar uma rota e calcular velocidade.",
          );
          return;
        }

        // Limpa a rota anterior do mapa
        currentRouteGroup.clearLayers();

        let coordsForBounds = [];

        // Faz o loop calculando a velocidade entre o ponto atual e o anterior
        for (let i = 1; i < points.length; i++) {
          const p1 = points[i - 1];
          const p2 = points[i];

          // Calcula distância e tempo
          const distanceKm = getDistance(p1.lat, p1.lng, p2.lat, p2.lng);
          const timeDiffSec = p2.t - p1.t;

          let speedKmH = 0;
          // Evita divisão por zero caso o equipamento mande dois pontos no mesmo segundo
          if (timeDiffSec > 0) {
            // (distância em km) / (tempo em horas)
            speedKmH = distanceKm / (timeDiffSec / 3600);
          }

          const color = getSpeedColor(speedKmH);

          // Cria a pequena linha ligando apenas estes dois pontos
          const segment = L.polyline(
            [
              [p1.lat, p1.lng],
              [p2.lat, p2.lng],
            ],
            { color: color, weight: 5 },
          );

          // Adiciona o "balão" flutuante (Tooltip) que aparece ao passar o mouse
          segment.bindTooltip(
            `Velocidade: <b>${speedKmH.toFixed(1)} km/h</b>`,
            {
              sticky: true,
              className: "speed-tooltip",
            },
          );

          // Adiciona o segmento ao grupo
          currentRouteGroup.addLayer(segment);
          coordsForBounds.push([p2.lat, p2.lng]);
        }

        // Centraliza o mapa pegando a área de todos os segmentos desenhados
        if (coordsForBounds.length > 0) {
          map.fitBounds(currentRouteGroup.getBounds());
        }
      }

      async function init() {
        await loadTrips();

        const params = new URLSearchParams(window.location.search);
        const targetBatchId = params.get("id");

        if (targetBatchId) {
          console.log(`Carregando mapa direto da URL para: ${targetBatchId}`);
          drawRoute(targetBatchId);
        }
      }

      // Aciona o motor
      init();
    </script>
  </body>
</html>
