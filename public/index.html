<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iMov Central Painel</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="header-main-container">
      <div class="logo-box">
        <img src="assets/imovt.png" height="60" alt="Logo" />
      </div>
      <div class="header-panel">
        <h2>Rastreamento</h2>
        <input
          type="text"
          id="batchId"
          placeholder="Cole o Batch ID da viagem..."
        />
        <button id="btnBuscar">Buscar</button>
      </div>
      <div class="profile-box">
        <div class="profile-info">
          <div class="profile-name">Marcos Corazza</div>
          <span class="profile-role">Engenheiro</span>
        </div>

        <div class="profile-picture">
          <img src="assets/avatar.png" alt="Avatar" />
        </div>

        <div class="logout-btn" title="Sair do Sistema">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </div>
      </div>
    </div>

    <div id="workspace">
      <div class="upper-container">
        <div class="sidebar-wrapper">
          <h3>Resumo da Viagem</h3>
          <div id="trip-details">
            <div class="info-label">Status da Análise</div>
            <div class="info-value" style="color: #c0392b; font-weight: bold">
              ⚠️ Consolidação Concluída com Alertas
            </div>
            <div class="info-label">Duração da Viagem</div>
            <div class="info-value">12h e 34m</div>
            <div class="info-label">Total de Pontos</div>
            <div class="info-value">1.840.210</div>
          </div>
          <button class="btn-full-chart" id="btnVerGraficoCompleto">
            📊 Ver Gráfico Completo
          </button>
        </div>

        <div class="map-wrapper"><div id="map"></div></div>

        <div class="right-panel-wrapper">
          <h3>Camadas do Mapa</h3>
          <div class="layer-toggle-container">
            <span class="layer-toggle-label">⬇ Força Vertical</span>
            <label class="switch">
              <input type="checkbox" id="toggleLayerCritical" checked />
              <span class="slider critical"></span>
            </label>
          </div>
          <div class="layer-toggle-container">
            <span class="layer-toggle-label">⏲ Velocidade (Km/h)</span>
            <label class="switch">
              <input type="checkbox" id="toggleLayerSpeed" />
              <span class="slider speed"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="chart-wrapper">
        <button class="btn-fechar-bottom" id="btnFecharBottom">✖</button>
        <div id="bottom-chart-container"></div>
      </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-content">
        <button class="btn-fechar-modal" id="btnFecharModal">✖</button>
        <div id="modal-chart-container"></div>
      </div>
    </div>

    <div class="trip-list-drawer">
      <div class="drawer-tab"><span>⬅ HISTÓRICO</span></div>
      <div class="drawer-header">Últimas Viagens</div>
      <div class="drawer-content" id="lista-viagens-container">
        <div style="text-align: center; color: #7f8c8d; margin-top: 20px">
          ⏳ Carregando histórico...
        </div>
      </div>
    </div>

    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
