<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard de Telemetria</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="assets/styles.css">
  </head>
<body>
    <div id="sidebar">
      <h2>Viagens</h2>
      <div id="trip-list">Carregando...</div>
    </div>

    <div id="main-content">
      <button id="menu-toggle">☰ Viagens</button>
      <div class="top-cards">
        <div class="card">
          <div class="card-title">Distância Total</div>
          <div class="card-value" id="card-distance">-- <span class="card-unit">km</span></div>
        </div>
        <div class="card" style="border-left-color: #ff9900;">
          <div class="card-title">Velocidade Máxima</div>
          <div class="card-value" id="card-max-speed">-- <span class="card-unit">km/h</span></div>
        </div>
        <div class="card" style="border-left-color: #33cc33;">
          <div class="card-title">Tempo de Viagem</div>
          <div class="card-value" id="card-time">--:-- <span class="card-unit">h:m</span></div>
        </div>
        <div class="card" style="border-left-color: #e74c3c;">
          <div class="card-title"></div>
          <div class="card-value" id="card-strain">---- <span class="card-unit"></span></div>
        </div>
      </div>

      <div id="map-wrapper">
        <div id="map"></div>
        
        <div id="speed-legend">
          <strong>Velocidade</strong><br />
          <div class="legend-item"><i style="background: #ff0000"></i> > 40 km/h</div>
          <div class="legend-item"><i style="background: #ff9900"></i> 20 - 40 km/h</div>
          <div class="legend-item"><i style="background: #33cc33"></i> 5 - 20 km/h</div>
          <div class="legend-item"><i style="background: #3388ff"></i> 0 - 5 km/h</div>
        </div>
      </div>
    </div>
    </body>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/scripts.js"></script>
  </body>
</html>
