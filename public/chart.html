<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard iMov - Strain Gauge</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #e9ecef;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
      }
      .card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        padding: 24px;
        width: 100%;
        max-width: 1200px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 15px;
      }
      h2 {
        color: #2c3e50;
        margin: 0;
      }
      /* Estilo dos Controles */
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        margin-bottom: 20px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
      }
      .input-group label {
        font-size: 12px;
        font-weight: bold;
        color: #6c757d;
        margin-bottom: 4px;
        text-transform: uppercase;
      }
      input {
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        font-size: 14px;
        min-width: 250px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #3498db;
      }
      button {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 20px; /* Alinha com os inputs */
      }
      button:hover {
        background-color: #2980b9;
      }
      /* Div do Gráfico */
      #chart-container {
        width: 100%;
        height: 500px;
        border: 1px solid #eee;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h2>Análise de Tensão - Truque A</h2>
      </div>

      <div class="controls">
        <div class="input-group">
          <label for="batchId">Batch ID (Viagem)</label>
          <input
            type="text"
            id="batchId"
            value="bebd1b65-29f5-4c44-9eda-1e94b26d7380"
            placeholder="Ex: bebd1b65-29f5-4c44-9eda-1e94b26d7380"
          />
        </div>

        <div class="input-group">
          <label for="parquetRef">Referência do Parquet (Trecho)</label>
          <input
            type="text"
            id="parquetRef"
            value="1voBgS_1voBqr"
            placeholder="Ex: 1voBgS_1voBqr"
          />
        </div>

        <button id="btnBuscar">Gerar Gráfico</button>
      </div>

      <div id="chart-container"></div>
    </div>

    <script>
      const chartDom = document.getElementById("chart-container");
      const myChart = echarts.init(chartDom);

      function carregarGrafico() {
        const batchId = document.getElementById("batchId").value.trim();
        const parquetRef = document.getElementById("parquetRef").value.trim();

        if (!batchId || !parquetRef) {
          alert("Por favor, preencha o Batch ID e a Referência do Parquet.");
          return;
        }

        const API_URL = `https://trips.svxdigital.com/api/chart/${batchId}/${parquetRef}`;

        myChart.clear();
        myChart.showLoading({
          text: "Buscando dados no banco de dados...",
          color: "#3498db",
        });

        fetch(API_URL)
          .then((response) => {
            if (!response.ok) {
              throw new Error(
                `Erro ${response.status}: Trecho não encontrado no banco de dados.`,
              );
            }
            return response.json();
          })
          .then((data) => {
            myChart.hideLoading();

            if (!data || data.length === 0) {
              alert("Nenhum dado encontrado para este trecho.");
              return;
            }

            const eixoX_Tempo = data.map((item) => {
              let dataFormatada = new Date(item.t * 1000);
              return dataFormatada.toLocaleTimeString("pt-BR");
            });

            const eixoY_Max = data.map((item) => item.max);
            const eixoY_Min = data.map((item) => item.min);
            const eixoY_Avg = data.map((item) => item.avg);

            const option = {
              tooltip: { trigger: "axis", axisPointer: { type: "cross" } },
              legend: {
                data: ["Máxima", "Média", "Mínima"],
                top: "bottom",
              },
              grid: {
                left: "3%",
                right: "4%",
                bottom: "15%",
                top: "5%",
                containLabel: true,
              },
              dataZoom: [
                { type: "inside", start: 0, end: 100 },
                { type: "slider", start: 0, end: 100 },
              ],
              xAxis: {
                type: "category",
                boundaryGap: false,
                data: eixoX_Tempo,
              },
              yAxis: { type: "value", name: "Truque_A", scale: true },
              series: [
                {
                  name: "Máxima",
                  type: "line",
                  data: eixoY_Max,
                  color: "#e74c3c",
                  lineStyle: { width: 2 },
                  showSymbol: false,
                },
                {
                  name: "Média",
                  type: "line",
                  data: eixoY_Avg,
                  color: "#f1c40f",
                  lineStyle: { width: 2, type: "dashed" },
                  showSymbol: false,
                },
                {
                  name: "Mínima",
                  type: "line",
                  data: eixoY_Min,
                  color: "#3498db",
                  lineStyle: { width: 2 },
                  showSymbol: false,
                },
              ],
            };

            myChart.setOption(option);
          })
          .catch((error) => {
            console.error("Erro na requisição:", error);
            myChart.hideLoading();
            alert(error.message);
          });
      }

      document
        .getElementById("btnBuscar")
        .addEventListener("click", carregarGrafico);

      document
        .getElementById("parquetRef")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            carregarGrafico();
          }
        });

      window.addEventListener("resize", () => {
        myChart.resize();
      });
    </script>
  </body>
</html>
